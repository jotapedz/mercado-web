services:
  postgres:
    image: postgres:16
    container_name: mercado_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mercado_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mercado_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mercado_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mercado_postgres_data:
